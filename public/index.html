<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDNS 管理面板</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card-bg: #fff;
      --border: #e4e7ed;
      --text: #303133;
      --text-secondary: #909399;
      --primary: #409eff;
      --success: #67c23a;
      --warning: #e6a23c;
      --danger: #f56c6c;
      --radius: 8px;
      --shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    h1 .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); }
    h1 .dot.off { background: var(--danger); }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
    .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-group { margin-bottom: 12px; flex: 1; min-width: 200px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; transition: border-color .2s; }
    .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
    .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #3a8ee6; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #5daf34; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #e04b4b; }
    .btn-default { background: #fff; color: var(--text); border: 1px solid var(--border); }
    .btn-default:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm { padding: 4px 12px; font-size: 12px; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { font-weight: 600; color: var(--text-secondary); font-size: 13px; }
    tr:hover { background: #f5f7fa; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 500; margin: 3px; }
    .badge-success { background: #e1f3d8; color: var(--success); }
    .badge-warning { background: #faecd8; color: var(--warning); }
    .badge-danger { background: #fde2e2; color: var(--danger); }
    .badge-info { background: #e6f0fb; color: var(--primary); }
    .log-viewer { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 6px; font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; line-height: 1.8; }
    .log-viewer .log-error { color: #f56c6c; }
    .log-viewer .log-success { color: #67c23a; }
    .log-viewer .log-info { color: #909399; }
    .sync-result-panel { background: #fafafa; border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-top: 12px; }
    .sync-result-item { padding: 10px 0; border-bottom: 1px solid #eee; }
    .sync-result-item:last-child { border-bottom: none; }
    .sync-result-item .domain { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .sync-result-item .detail { font-size: 13px; color: var(--text-secondary); }
    .sync-result-item .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .status-created { background: #e1f3d8; color: var(--success); }
    .status-updated { background: #faecd8; color: var(--warning); }
    .status-unchanged { background: #e6f0fb; color: var(--primary); }
    .status-error { background: #fde2e2; color: var(--danger); }
    .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; color: #fff; font-size: 14px; z-index: 999; animation: slideIn .3s ease; box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .badge-nat0 { background: #e1f3d8; color: var(--success); }
    .badge-nat1 { background: #e1f3d8; color: var(--success); }
    .badge-nat2 { background: #faecd8; color: var(--warning); }
    .badge-nat3 { background: #fde2e2; color: var(--danger); }
    .badge-nat4 { background: #fde2e2; color: var(--danger); }
    .nat-panel { margin-top:12px; display:none; padding:12px; background:#fafafa; border:1px solid var(--border); border-radius:6px; }
    .nat-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
    .nat-details { font-size:13px; color:var(--text-secondary); margin-bottom:8px; }
    .nat-details code { background:#e8e8e8; padding:1px 6px; border-radius:3px; font-size:12px; }
    .nat-warning { margin-top:8px; }
    .toast-success { background: var(--success); }
    .toast-error { background: var(--danger); }
    .toast-warning { background: var(--warning); }
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #c0c4cc; border-radius: 22px; transition: .3s; }
    .slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
    input:checked + .slider { background: var(--primary); }
    input:checked + .slider:before { transform: translateX(18px); }
    .status-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .status-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .status-value { font-weight: 600; font-family: monospace; }
    .empty { text-align: center; color: var(--text-secondary); padding: 30px 0; font-size: 14px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
    @media (max-width: 640px) { .row { flex-direction: column; } .form-group { min-width: 100%; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      🌐 DDNS 管理面板
      <span class="dot" id="statusDot"></span>
    </h1>

    <!-- 云厂商配置 -->
    <div class="card">
      <h2>🔑 云厂商 API 配置</h2>
      <div class="row">
        <div class="form-group">
          <label>云厂商</label>
          <select id="provider" onchange="updateProvider()">
            <option value="aliyun">阿里云</option>
            <option value="tencent">腾讯云 DNSPod</option>
            <option value="huawei">华为云</option>
            <option value="cloudflare">Cloudflare</option>
          </select>
        </div>
        <div id="credentialFields"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
        <button class="btn btn-default" onclick="testConnection()">🔍 测试连接</button>
      </div>
      <div id="testResult" style="margin-top:10px;"></div>
    </div>

    <!-- IPv4/IPv6 设置 -->
    <div class="card">
      <h2>🌍 IP 类型设置</h2>
      <div class="row">
        <div class="form-group">
          <label>IPv4 解析</label>
          <div><label class="switch"><input type="checkbox" id="ipv4Toggle" onchange="saveQuickConfig()"><span class="slider"></span></label></div>
        </div>
        <div class="form-group">
          <label>IPv6 解析</label>
          <div><label class="switch"><input type="checkbox" id="ipv6Toggle" onchange="saveQuickConfig()"><span class="slider"></span></label></div>
        </div>
        <div class="form-group">
          <label>同步间隔（秒）</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="number" id="intervalInput" placeholder="300" min="30" max="86400" onchange="saveQuickConfig()" style="width:100px;">
            <span style="font-size:12px;color:var(--text-secondary);">建议：300秒（5分钟）</span>
          </div>
          <div style="margin-top:8px;">
            <button class="btn btn-sm btn-default" onclick="setInterval(60)">60秒</button>
            <button class="btn btn-sm btn-default" onclick="setInterval(300)">5分钟</button>
            <button class="btn btn-sm btn-default" onclick="setInterval(600)">10分钟</button>
            <button class="btn btn-sm btn-default" onclick="setInterval(1800)">30分钟</button>
          </div>
        </div>
      </div>
      <div class="status-row">
        <div class="status-item">当前 IPv4: <span class="status-value" id="ipv4Addr">-</span></div>
        <div class="status-item">当前 IPv6: <span class="status-value" id="ipv6Addr">-</span></div>
        <button class="btn btn-sm btn-default" onclick="refreshIPs()">🔄 刷新IP</button>
      </div>
      <div style="margin-top:12px;">
        <details>
          <summary style="cursor:pointer;font-size:13px;color:var(--text-secondary);user-select:none;">STUN 测试节点设置</summary>
          <div id="stunServerList" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;"></div>
          <div style="margin-top:6px;font-size:12px;color:var(--text-secondary);">
            选择用于 NAT 类型检测的 STUN 服务器（至少 2 个以获得准确结果）
          </div>
        </details>
      </div>
      <div id="natPanel" class="nat-panel">
        <div class="nat-header">
          <span style="font-weight:600;">NAT 类型:</span>
          <span id="natType" class="badge">-</span>
          <span id="natName" style="font-size:13px;color:var(--text-secondary);"></span>
        </div>
        <div id="natDetails" class="nat-details"></div>
        <div id="natDescription" style="display:none;"></div>
        <div id="natWarning" class="nat-warning"></div>
      </div>
    </div>

    <!-- 域名管理 -->
    <div class="card">
      <div class="card-header">
        <h2>📋 域名管理</h2>
        <button class="btn btn-primary btn-sm" onclick="addDomainRow()">+ 添加域名</button>
      </div>
      <table id="domainTable">
        <thead>
          <tr><th>域名</th><th>主机记录 (RR)</th><th>记录类型</th><th>状态</th><th>操作</th></tr>
        </thead>
        <tbody id="domainTbody">
        </tbody>
      </table>
      <div id="domainEmpty" class="empty" style="display:none;">暂无域名配置，点击上方按钮添加</div>
      <button class="btn btn-success" onclick="saveDomains()" style="margin-top:12px;">💾 保存域名</button>
    </div>

    <!-- 同步操作与结果 -->
    <div class="two-col">
      <div class="card">
        <div class="card-header">
          <h2>⚡ 同步操作</h2>
          <span style="font-size:13px;color:var(--text-secondary);" id="lastSync">上次同步: -</span>
        </div>
        <button class="btn btn-primary" onclick="manualSync()" id="syncBtn">🔄 立即同步</button>
      </div>
      <div class="card">
        <h2>📊 同步结果</h2>
        <div id="syncResult" class="sync-result-panel">
          <div class="empty">点击「立即同步」查看结果</div>
        </div>
      </div>
    </div>

    <!-- 运行日志 -->
    <div class="card">
      <div class="card-header">
        <h2>📜 运行日志</h2>
        <div>
          <button class="btn btn-sm btn-default" onclick="refreshLogs()">🔄 刷新日志</button>
          <button class="btn btn-sm btn-danger" onclick="clearLogs()" style="margin-left:4px;">🗑️ 清空</button>
        </div>
      </div>
      <div class="log-viewer" id="logViewer">加载中...</div>
    </div>
  </div>

  <script>
    let config = {};
    let domains = [];

    // Provider field definitions
    const PROVIDER_FIELDS = {
      aliyun: [
        { key: 'accessKeyId', label: 'AccessKey ID', type: 'text', placeholder: '输入阿里云 AccessKey ID' },
        { key: 'accessKeySecret', label: 'AccessKey Secret', type: 'password', placeholder: '输入阿里云 AccessKey Secret' }
      ],
      tencent: [
        { key: 'secretId', label: 'SecretId', type: 'text', placeholder: '输入腾讯云 SecretId' },
        { key: 'secretKey', label: 'SecretKey', type: 'password', placeholder: '输入腾讯云 SecretKey' }
      ],
      huawei: [
        { key: 'ak', label: 'AK (Access Key)', type: 'text', placeholder: '输入华为云 AK' },
        { key: 'sk', label: 'SK (Secret Key)', type: 'password', placeholder: '输入华为云 SK' }
      ],
      cloudflare: [
        { key: 'apiToken', label: 'API Token', type: 'password', placeholder: '输入 Cloudflare API Token' }
      ]
    };

    async function api(url, options = {}) {
      const res = await fetch(url, options);
      return res.json();
    }

    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    function toggleSecret(btn) {
      const input = btn.previousElementSibling;
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    function setInterval(seconds) {
      document.getElementById('intervalInput').value = seconds;
      saveQuickConfig();
    }

    function updateProvider() {
      const provider = document.getElementById('provider').value;
      const container = document.getElementById('credentialFields');
      const fields = PROVIDER_FIELDS[provider] || [];
      const creds = config.credentials?.[provider] || {};

      container.innerHTML = fields.map(f => {
        const val = creds[f.key] || '';
        const isPassword = f.type === 'password';
        return `<div class="form-group">
          <label>${f.label}</label>
          <div style="position:relative;">
            <input type="${f.type}" id="cred_${f.key}" value="${val}" placeholder="${f.placeholder}" style="${isPassword ? 'padding-right:40px;' : ''}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            ${isPassword ? '<button type="button" onclick="toggleSecret(this)" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;padding:4px;">👁️</button>' : ''}
          </div>
        </div>`;
      }).join('');
    }

    async function loadConfig() {
      config = await api('/api/config');
      // Set provider dropdown
      document.getElementById('provider').value = config.provider || 'aliyun';
      // Render credential fields for current provider
      updateProvider();
      document.getElementById('ipv4Toggle').checked = config.ipv4 !== false;
      document.getElementById('ipv6Toggle').checked = config.ipv6 === true;
      document.getElementById('intervalInput').value = config.interval || 300;
      domains = config.domains || [];
      renderDomains();
      loadStunServers();
      refreshIPs();
      refreshStatus();
      refreshLogs();
    }

    async function saveConfig() {
      const provider = document.getElementById('provider').value;
      const fields = PROVIDER_FIELDS[provider] || [];
      const creds = {};

      for (const f of fields) {
        const val = document.getElementById(`cred_${f.key}`)?.value.trim() || '';
        creds[f.key] = val;
        if (!val) {
          toast(`请填写 ${f.label}`, 'error');
          return;
        }
        if (val.length < 6) {
          toast(`${f.label} 长度不足`, 'error');
          return;
        }
      }

      const newConfig = {
        provider,
        credentials: { [provider]: creds }
      };
      const res = await api('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newConfig)
      });
      if (res.ok) toast('配置已保存');
      else toast('保存失败: ' + res.error, 'error');
      loadConfig();
    }

    async function saveQuickConfig() {
      const interval = parseInt(document.getElementById('intervalInput').value) || 300;
      await api('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ipv4: document.getElementById('ipv4Toggle').checked,
          ipv6: document.getElementById('ipv6Toggle').checked,
          interval: Math.max(30, Math.min(86400, interval))
        })
      });
      toast('设置已保存');
    }

    async function testConnection() {
      const provider = document.getElementById('provider').value;
      const providerNames = { aliyun: '阿里云', tencent: '腾讯云', huawei: '华为云', cloudflare: 'Cloudflare' };
      const name = providerNames[provider] || provider;
      const div = document.getElementById('testResult');
      div.innerHTML = '<span class="badge badge-info">测试中...</span>';
      const res = await api('/api/test-connection', { method: 'POST' });
      if (res.ok) {
        div.innerHTML = '<span class="badge badge-success">✅ 连接成功</span>';
        toast(`${name}连接成功`);
      } else {
        div.innerHTML = `<span class="badge badge-danger">❌ ${res.error}</span>`;
        toast('连接失败: ' + res.error, 'error');
      }
    }

    async function loadStunServers() {
      const servers = await api('/api/stun-servers');
      const container = document.getElementById('stunServerList');
      container.innerHTML = servers.map(s =>
        `<label style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:#f0f0f0;border-radius:4px;font-size:12px;cursor:pointer;">
          <input type="checkbox" value="${s.id}" checked class="stun-cb"> ${s.label}
        </label>`
      ).join('');
    }

    function getSelectedStunServers() {
      return Array.from(document.querySelectorAll('.stun-cb:checked')).map(cb => cb.value);
    }

    async function refreshIPs() {
      const btn = event && event.target;
      if (btn) { btn.disabled = true; btn.textContent = '⏳ 检测中...'; }
      const servers = getSelectedStunServers();
      const qs = servers.length ? '?servers=' + servers.join(',') : '';
      const data = await api('/api/current-ips' + qs);
      if (btn) { btn.disabled = false; btn.textContent = '🔄 刷新IP'; }
      document.getElementById('ipv4Addr').textContent = data.ipv4 || 'N/A';
      document.getElementById('ipv6Addr').textContent = data.ipv6 || 'N/A';

      const panel = document.getElementById('natPanel');
      if (data.nat) {
        panel.style.display = 'block';
        const typeEl = document.getElementById('natType');
        typeEl.textContent = data.nat.type;
        typeEl.className = `badge badge-${data.nat.type.toLowerCase()}`;
        document.getElementById('natName').textContent = data.nat.name || '';

        const details = [];
        if (data.nat.localIP) details.push(`本地 IP: <code>${data.nat.localIP}</code>`);
        if (data.nat.mappedIP) details.push(`映射地址: <code>${data.nat.mappedIP}:${data.nat.mappedPort}</code>`);
        if (data.nat.server) details.push(`主 STUN: <code>${data.nat.server}</code>`);
        if (data.nat.serversQueried) details.push(`测试节点: <code>${data.nat.serversResponded}/${data.nat.serversQueried} 响应</code>`);
        document.getElementById('natDetails').innerHTML = details.join(' &nbsp;|&nbsp; ');

        const descDiv = document.getElementById('natDescription');
        if (data.nat.description) {
          descDiv.innerHTML = `<div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">${data.nat.description}</div>`;
          descDiv.style.display = 'block';
        } else {
          descDiv.style.display = 'none';
        }

        const warningDiv = document.getElementById('natWarning');
        if (data.warning) {
          const severity = data.nat.type === 'NAT4' ? 'danger' : 'warning';
          warningDiv.innerHTML = `<div class="badge badge-${severity}">⚠️ ${data.warning}</div>`;
        } else {
          warningDiv.innerHTML = `<div class="badge badge-success">✅ NAT 类型正常，DDNS 可用</div>`;
        }
      } else if (data.warning) {
        panel.style.display = 'block';
        document.getElementById('natType').textContent = '未知';
        document.getElementById('natType').className = 'badge badge-warning';
        document.getElementById('natName').textContent = '';
        document.getElementById('natDetails').innerHTML = '';
        document.getElementById('natDescription').style.display = 'none';
        document.getElementById('natWarning').innerHTML =
          `<div class="badge badge-warning">⚠️ ${data.warning}</div>`;
      } else {
        panel.style.display = 'none';
      }
    }

    async function refreshStatus() {
      const status = await api('/api/status');
      if (status.lastSync) {
        document.getElementById('lastSync').textContent = '上次同步: ' + new Date(status.lastSync).toLocaleString('zh-CN');
      }
      const dot = document.getElementById('statusDot');
      dot.className = 'dot' + (status.lastSync ? '' : ' off');
    }

    function renderDomains() {
      const tbody = document.getElementById('domainTbody');
      const empty = document.getElementById('domainEmpty');
      if (!domains.length) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      tbody.innerHTML = domains.map((d, i) => `
        <tr>
          <td><input type="text" value="${d.domain || ''}" placeholder="example.com" onchange="updateDomain(${i},'domain',this.value)" style="width:100%;padding:4px 8px;border:1px solid var(--border);border-radius:4px;"></td>
          <td><input type="text" value="${d.rr || '@'}" placeholder="@" onchange="updateDomain(${i},'rr',this.value)" style="width:100%;padding:4px 8px;border:1px solid var(--border);border-radius:4px;"></td>
          <td>
            <select onchange="updateDomain(${i},'type',this.value)" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;">
              <option value="">自动</option>
              <option value="A" ${d.type==='A'?'selected':''}>A (IPv4)</option>
              <option value="AAAA" ${d.type==='AAAA'?'selected':''}>AAAA (IPv6)</option>
            </select>
          </td>
          <td>
            <label class="switch">
              <input type="checkbox" ${d.enabled!==false?'checked':''} onchange="updateDomain(${i},'enabled',this.checked)">
              <span class="slider"></span>
            </label>
          </td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="removeDomain(${i})">删除</button>
          </td>
        </tr>
      `).join('');
    }

    function addDomainRow() {
      domains.push({ domain: '', rr: '@', type: '', enabled: true });
      renderDomains();
    }

    function updateDomain(index, key, value) {
      domains[index][key] = value;
    }

    function removeDomain(index) {
      domains.splice(index, 1);
      renderDomains();
    }

    async function saveDomains() {
      const valid = domains.filter(d => d.domain.trim());
      const res = await api('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ domains: valid })
      });
      if (res.ok) { toast('域名配置已保存'); loadConfig(); }
      else toast('保存失败: ' + res.error, 'error');
    }

    async function manualSync() {
      const btn = document.getElementById('syncBtn');
      btn.disabled = true;
      btn.textContent = '⏳ 同步中...';
      const div = document.getElementById('syncResult');
      div.innerHTML = '<div class="empty">正在同步，请稍候...</div>';

      const res = await api('/api/sync', { method: 'POST' });
      btn.disabled = false;
      btn.textContent = '🔄 立即同步';

      if (res.ok && res.results) {
        div.innerHTML = res.results.map(r => {
          const statusClass = r.action === 'error' ? 'status-error' :
                             r.action === 'updated' ? 'status-updated' :
                             r.action === 'created' ? 'status-created' : 'status-unchanged';
          const statusText = r.action === 'error' ? '失败' :
                            r.action === 'updated' ? '已更新' :
                            r.action === 'created' ? '已创建' : '未变更';
          const ipInfo = r.ip ? `IP: ${r.ip}` : '';
          const oldIpInfo = r.oldIP ? ` (原: ${r.oldIP})` : '';
          const errorInfo = r.error ? `<br><span style="color:var(--danger);font-size:12px;">错误: ${r.error}</span>` : '';

          return `<div class="sync-result-item">
            <div class="domain">${r.rr}.${r.domain} <span class="status ${statusClass}">${statusText}</span></div>
            <div class="detail">${r.type} 记录 ${ipInfo}${oldIpInfo}${errorInfo}</div>
          </div>`;
        }).join('');

        const hasError = res.results.some(r => r.action === 'error');
        if (hasError) {
          toast('部分同步失败，请查看详情', 'warning');
        } else {
          toast('同步完成');
        }
      } else {
        div.innerHTML = `<span class="badge badge-danger">${res.error||'同步失败'}</span>`;
        toast('同步失败: ' + (res.error || ''), 'error');
      }
      refreshStatus();
      refreshLogs();
    }

    async function refreshLogs() {
      const logs = await api('/api/logs?lines=100');
      const viewer = document.getElementById('logViewer');
      if (logs.length) {
        viewer.innerHTML = logs.map(line => {
          // Only show OK and ERROR lines
          if (line.includes('[ERROR]')) {
            return `<span class="log-error">${line}</span>`;
          } else if (line.includes('[OK]')) {
            return `<span class="log-success">${line}</span>`;
          } else if (line.includes('[DDNS]')) {
            return `<span class="log-info">${line}</span>`;
          }
          return null;
        }).filter(line => line !== null).join('\n');
        viewer.scrollTop = viewer.scrollHeight;
      } else {
        viewer.textContent = '暂无日志';
      }
    }

    async function clearLogs() {
      if (confirm('确定要清空日志吗？')) {
        await api('/api/logs/clear', { method: 'POST' });
        refreshLogs();
        toast('日志已清空');
      }
    }

    loadConfig();
    setInterval(refreshStatus, 10000);
    setInterval(refreshLogs, 15000);
  </script>
</body>
</html>
